apiVersion: apps/v1
kind: Deployment

metadata:
  name: multimodal-agent

spec:
  replicas: 2

  selector:
    matchLabels:
      app: multimodal-agent

  template:
    metadata:
      labels:
        app: multimodal-agent

    spec:
      containers:
      - name: multimodal-agent

        image: myapp:v3

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8000