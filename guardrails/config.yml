# guardrails/config.yml
models:
  - type: main
    engine: openai
    model: gpt-4o-mini

instructions:
  - type: general
    content: |
      You are a helpful assistant. Answer the user's questions concisely.

parameters:
  temperature: 0.7
  max_tokens: 500

rails:
  input:
    flows:
      - safety check